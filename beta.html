<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Schultracker — Neue Version</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body{font-family:'Inter',sans-serif} 
    .mono-time { font-variant-numeric: tabular-nums; }
    .gradient-dashboard { background: linear-gradient(135deg, var(--color-primary, #4f46e5) 0%, var(--color-secondary, #7c3aed) 100%); }
    .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15); }
    .progress-ring { transition: stroke-dashoffset 0.5s ease; }
  </style>
</head>
<body class="bg-gradient-to-b from-white to-slate-50 dark:from-slate-900 dark:to-slate-900 text-slate-800 dark:text-slate-200 min-h-screen">
  <div id="beta-root" class="min-h-screen"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const DEFAULT_VACATIONS = {
      Herbstferien: { from: "2025-10-25", to: "2025-11-02" },
      Weihnachtsferien: { from: "2025-12-20", to: "2026-01-06" },
      Fasnachtsferien: { from: "2026-02-13", to: "2026-02-22" },
      Osterferien: { from: "2026-03-28", to: "2026-04-12" },
      Pfingstferien: { from: "2026-05-23", to: "2026-06-07" },
      Sommerferien: { from: "2026-07-30", to: "2026-09-13" }
    };

    function toDateISO(s){ if(!s) return null; const d = new Date(s + 'T00:00:00'); return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
    function toDateISOLocal(s){ if(!s) return null; const d = new Date(s + 'T00:00:00'); return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }

    function formatDate(d){ if(!d) return '—'; return d.toLocaleDateString('de-DE', { day: '2-digit', month:'2-digit', year:'numeric' }) }

    function useNow(interval=1000, offsetMs=0){ const [now, setNow] = useState(new Date()); useEffect(()=>{ const t = setInterval(()=> setNow(new Date()), interval); return ()=> clearInterval(t); }, [interval]); return useMemo(()=> new Date(now.getTime() + offsetMs), [now, offsetMs]); }

    function Nav({active, onChange, dark, setDark}){
      return (
        <header className="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="flex justify-between h-16 items-center">
              <div className="flex items-center gap-4">
                <div className="text-indigo-600 font-extrabold text-lg">Schultracker</div>
                <nav className="hidden md:flex gap-2">
                  {['Dashboard','Kalender','Stundenplan','Experimente','Einstellungen'].map(item=> (
                    <button key={item} onClick={()=>onChange(item)} className={`px-3 py-1 rounded-md font-medium ${active===item? 'bg-indigo-100 dark:bg-slate-700 text-indigo-700 dark:text-indigo-300' : 'text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700'}`}>
                      {item}
                    </button>
                  ))}
                </nav>
              </div>
              <div className="flex items-center gap-3">
                <button onClick={()=>setDark(d=>!d)} className="px-3 py-1 rounded-md bg-slate-100 dark:bg-slate-700">{dark? 'Light' : 'Dark'}</button>
                <a href="index.html" className="ml-2 px-3 py-1 rounded-md bg-indigo-600 text-white">Stable</a>
              </div>
            </div>
          </div>
        </header>
      )
    }

    function BetaApp(){
      const [active, setActive] = useState('Dashboard');
      const [dark, setDark] = useState(() => JSON.parse(localStorage.getItem('beta_dark') || 'false'));
      const [vacations, setVacations] = useState(() => JSON.parse(localStorage.getItem('beta_vacations') || JSON.stringify(DEFAULT_VACATIONS)));
      const [settings, setSettings] = useState(() => JSON.parse(localStorage.getItem('beta_settings') || JSON.stringify({ 
        timeSimulator:false, 
        autoAlerts:false, 
        newDesign:true,
        primaryColor: '#4f46e5',
        secondaryColor: '#7c3aed',
        accentColor: '#06b6d4',
        compactMode: false,
        animationsEnabled: true,
        cardStyle: 'elevated' // elevated, flat, outline
      })));
      const [todos, setTodos] = useState(() => JSON.parse(localStorage.getItem('beta_todos') || '[]'));
      const [viewDate, setViewDate] = useState(() => {
        const saved = localStorage.getItem('beta_viewDate');
        if(saved) return new Date(saved);
        const d = new Date();
        d.setDate(1);
        return d;
      });

      useEffect(()=>{ localStorage.setItem('beta_vacations', JSON.stringify(vacations)); }, [vacations]);
      useEffect(()=>{ localStorage.setItem('beta_settings', JSON.stringify(settings)); }, [settings]);
      useEffect(()=>{ localStorage.setItem('beta_dark', JSON.stringify(dark)); if(dark) document.documentElement.classList.add('dark'); else document.documentElement.classList.remove('dark'); }, [dark]);
      useEffect(()=>{ localStorage.setItem('beta_todos', JSON.stringify(todos)); }, [todos]);
      useEffect(()=>{ localStorage.setItem('beta_viewDate', viewDate.toISOString()); }, [viewDate]);
      
      useEffect(()=> {
        const root = document.documentElement;
        root.style.setProperty('--color-primary', settings.primaryColor);
        root.style.setProperty('--color-secondary', settings.secondaryColor);
        root.style.setProperty('--color-accent', settings.accentColor);
      }, [settings.primaryColor, settings.secondaryColor, settings.accentColor]);

      // use a 13s offset like the main app
      const now = useNow(1000, 13*1000);

      function handleExport(){ const payload = { vacations, settings, dark, todos }; const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'schultracker-export.json'; a.click(); URL.revokeObjectURL(url); }
      function handleImport(e){ const f = e.target.files && e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = () => { try{ const data = JSON.parse(r.result); if(data.vacations) setVacations(data.vacations); if(data.settings) setSettings(data.settings); if(typeof data.dark === 'boolean') setDark(data.dark); if(Array.isArray(data.todos)) setTodos(data.todos); alert('Import erfolgreich'); }catch(err){ alert('Ungültige Datei'); } }; r.readAsText(f); }

      function Calendar({todos, setTodos, viewDate, setViewDate}){
        const [inputTitle, setInputTitle] = useState('');
        const [selectedDate, setSelectedDate] = useState(null);

        function startOfMonth(d){ return new Date(d.getFullYear(), d.getMonth(), 1); }
        function endOfMonth(d){ return new Date(d.getFullYear(), d.getMonth()+1, 0); }

        const start = startOfMonth(viewDate);
        const end = endOfMonth(viewDate);
        const startWeekday = start.getDay();

        const days = [];
        for(let i=0;i<startWeekday;i++) days.push(null);
        for(let d=1; d<=end.getDate(); d++) days.push(new Date(viewDate.getFullYear(), viewDate.getMonth(), d));

        function nextMonth(){ 
          setViewDate(d => new Date(d.getFullYear(), d.getMonth()+1, 1)); 
        }
        function prevMonth(){ 
          setViewDate(d => new Date(d.getFullYear(), d.getMonth()-1, 1)); 
        }

        function dateKey(day){ return new Date(day.getFullYear(), day.getMonth(), day.getDate()).toISOString().slice(0,10); }
        function todosForDate(day){ if(!day) return []; const key = dateKey(day); return todos.filter(t => t.date === key); }

        function addTodo(day){ 
          if(!inputTitle.trim()) return; 
          const key = dateKey(day); 
          const item = { id: Date.now(), title: inputTitle.trim(), date: key, done: false }; 
          setTodos(t => [item, ...t]); 
          setInputTitle(''); 
          setSelectedDate(null);
        }

        function toggleDone(id){ setTodos(t => t.map(x => x.id===id? {...x, done: !x.done} : x)); }
        function removeTodo(id){ setTodos(t => t.filter(x => x.id!==id)); }

        return (
          <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-lg card-hover mt-6">
            <div className="flex items-center justify-between mb-6">
              <div>
                <h3 className="text-lg font-semibold">Kalender</h3>
                <div className="text-sm text-slate-500">{viewDate.toLocaleString('de-DE', { month: 'long', year: 'numeric' })}</div>
              </div>
              <div className="flex gap-2">
                <button onClick={prevMonth} className="px-4 py-2 bg-slate-100 dark:bg-slate-700 rounded-lg hover:bg-slate-200 transition">←</button>
                <button onClick={nextMonth} className="px-4 py-2 bg-slate-100 dark:bg-slate-700 rounded-lg hover:bg-slate-200 transition">→</button>
              </div>
            </div>

            <div className="grid grid-cols-7 gap-2 text-xs font-semibold text-slate-600 dark:text-slate-400 mb-2">
              {['So','Mo','Di','Mi','Do','Fr','Sa'].map(d=> <div key={d} className="text-center">{d}</div>)}
            </div>

            <div className="grid grid-cols-7 gap-2">
              {days.map((day, idx) => {
                const todayStr = new Date().toDateString();
                const dayStr = day ? day.toDateString() : null;
                const isToday = dayStr === todayStr;
                const dayTodos = day ? todosForDate(day) : [];
                return (
                <div key={idx} className={`min-h-[100px] p-3 rounded-lg border-2 transition cursor-pointer ${ day ? 'bg-white dark:bg-slate-700/50 border-slate-200 dark:border-slate-600 hover:border-indigo-400' : 'bg-transparent border-transparent'}`} onClick={()=> day && setSelectedDate(day)}>
                  {day ? (
                    <div className="h-full flex flex-col">
                      <div className={`font-semibold text-sm ${isToday ? 'text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-900/30 w-6 h-6 flex items-center justify-center rounded-full' : 'text-slate-800 dark:text-slate-200'}`}>
                        {day.getDate()}
                      </div>
                      <div className="mt-2 flex-1 space-y-1 text-xs">
                        {dayTodos.slice(0,2).map(t => (
                          <div key={t.id} className={`px-2 py-1 rounded bg-indigo-100 dark:bg-indigo-900/50 text-indigo-800 dark:text-indigo-200 truncate ${t.done ? 'line-through opacity-50' : ''}`}>
                            {t.title}
                          </div>
                        ))}
                        {dayTodos.length > 2 && <div className="text-xs text-slate-500">+{dayTodos.length - 2} mehr</div>}
                      </div>
                    </div>
                  ) : null}
                </div>
              )})}
            </div>

            {selectedDate && (
              <div className="mt-4 p-4 bg-indigo-50 dark:bg-indigo-900/20 rounded-lg border-2 border-indigo-200 dark:border-indigo-700">
                <div className="flex items-center justify-between mb-3">
                  <div className="text-sm font-semibold">{formatDate(selectedDate)}</div>
                  <button onClick={()=> setSelectedDate(null)} className="text-xs px-2 py-1 bg-slate-300 dark:bg-slate-600 rounded">✕</button>
                </div>
                <div className="flex gap-2">
                  <input value={inputTitle} onChange={e=>setInputTitle(e.target.value)} placeholder="Neues Todo..." className="flex-1 p-2 border rounded-lg dark:bg-slate-700 dark:border-slate-600" onKeyDown={(e)=> e.key==='Enter' && addTodo(selectedDate)} />
                  <button onClick={()=> addTodo(selectedDate)} className="px-3 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">+</button>
                </div>
                <div className="mt-3 space-y-1">
                  {todosForDate(selectedDate).map(t => (
                    <div key={t.id} className="flex items-center gap-2 p-2 bg-white dark:bg-slate-700 rounded-lg">
                      <button onClick={()=> toggleDone(t.id)} className={`w-5 h-5 rounded border-2 flex items-center justify-center text-xs ${ t.done ? 'bg-emerald-500 border-emerald-500 text-white' : 'border-slate-300 dark:border-slate-600' }`}>{t.done && '✓'}</button>
                      <span className={`flex-1 text-sm ${t.done ? 'line-through text-slate-400' : ''}`}>{t.title}</span>
                      <button onClick={()=> removeTodo(t.id)} className="text-red-500 hover:text-red-700 text-sm">✕</button>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )
      }

      function Dashboard({now, vacations, todos, setTodos, viewDate, setViewDate}){
        const DEFAULT_PUBLIC_HOLIDAYS = [
          "2025-10-03","2025-11-01","2025-12-25","2025-12-26","2026-01-01","2026-01-06",
          "2026-04-03","2026-04-06","2026-05-01","2026-05-14","2026-05-25","2026-06-04","2026-07-10"
        ];

        function dateAddDays(d,n){ const x = new Date(d); x.setDate(x.getDate()+n); return new Date(x.getFullYear(), x.getMonth(), x.getDate()); }
        function iterateDates(from,to){ const arr=[]; let cur = new Date(from); while(cur <= to){ arr.push(new Date(cur)); cur = dateAddDays(cur,1); } return arr; }

        const parsedVacations = useMemo(()=>{ const out = {}; Object.entries(vacations).forEach(([k,v])=>{ if(!v || !v.from) return (out[k]=null); out[k] = { from: toDateISOLocal(v.from), to: toDateISOLocal(v.to) }; }); return out; }, [vacations]);
        const parsedPublicHolidays = useMemo(()=> new Set(DEFAULT_PUBLIC_HOLIDAYS.map(d=> toDateISOLocal(d).toDateString() )), []);

        const schoolStart = toDateISOLocal('2025-09-14');
        const schoolEnd = toDateISOLocal('2026-07-29');

        function isSchoolDay(d){ const day = d.getDay(); if(day ===0 || day ===6) return false; if(parsedPublicHolidays.has(d.toDateString())) return false; for(const v of Object.values(parsedVacations)){ if(!v) continue; if(d >= v.from && d <= v.to) return false; } if(d < schoolStart || d > schoolEnd) return false; return true; }

        const days = iterateDates(schoolStart, schoolEnd);
        const total = days.reduce((acc,d) => acc + (isSchoolDay(d) ? 1 : 0), 0);
        const passed = iterateDates(schoolStart, now).reduce((acc,d) => acc + (isSchoolDay(d) && d <= now ? 1 : 0), 0);
        const percent = total ? Math.max(0, Math.min(100, Math.round((passed/total)*100))) : 0;
        const circumference = 2 * Math.PI * 45;
        
        // Todos für heute
        const todayStr = new Date().toISOString().slice(0,10);
        const todayTodos = todos.filter(t => t.date === todayStr);
        
        return (
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 p-6">
            {/* Große Fortschrittsanzeige */}
            <div className="lg:col-span-2 bg-gradient-to-br from-indigo-600 to-purple-600 dark:from-indigo-900 dark:to-purple-900 rounded-3xl p-8 shadow-xl text-white card-hover">
              <div className="flex items-start justify-between mb-6">
                <div>
                  <h2 className="text-2xl font-bold">Schuljahr Fortschritt</h2>
                  <p className="text-indigo-100 text-sm mt-1">Salvatorkolleg 2025/2026</p>
                </div>
                <div className="text-right">
                  <div className="text-3xl font-bold mono-time">{now.toLocaleTimeString('de-DE', { timeZone: 'Europe/Berlin' })}</div>
                  <div className="text-xs text-indigo-200">{formatDate(now)}</div>
                </div>
              </div>

              <div className="grid grid-cols-3 gap-4 mb-8">
                <div className="bg-white/20 rounded-xl p-4 backdrop-blur-sm">
                  <div className="text-3xl font-bold">{passed}</div>
                  <div className="text-xs text-indigo-100 mt-1">Schultage vorbei</div>
                </div>
                <div className="bg-white/20 rounded-xl p-4 backdrop-blur-sm">
                  <div className="text-3xl font-bold">{total - passed}</div>
                  <div className="text-xs text-indigo-100 mt-1">Schultage übrig</div>
                </div>
                <div className="bg-white/20 rounded-xl p-4 backdrop-blur-sm">
                  <div className="text-3xl font-bold">{percent}%</div>
                  <div className="text-xs text-indigo-100 mt-1">Abgeschlossen</div>
                </div>
              </div>

              <div className="w-full bg-white/20 rounded-full h-4 overflow-hidden backdrop-blur-sm">
                <div className="h-4 bg-emerald-400 rounded-full transition-all duration-500" style={{ width: `${percent}%` }}></div>
              </div>
              <div className="mt-3 text-sm text-indigo-100">Noch {total - passed} Schultage until Sommer!</div>
            </div>

            {/* Nächste Ferieninfo & Heutige Todos */}
            <div className="space-y-6">
              <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-lg card-hover">
                <h3 className="font-semibold text-slate-800 dark:text-slate-200 mb-4">Nächste Ferien</h3>
                <div className="space-y-3">
                  {Object.entries(vacations).slice(0, 3).map(([k,v])=> (
                    <div key={k} className="p-3 bg-slate-50 dark:bg-slate-700/50 rounded-lg border-l-4 border-indigo-500">
                      <div className="font-medium text-sm text-slate-800 dark:text-slate-200">{k}</div>
                      <div className="text-xs text-slate-600 dark:text-slate-400 mt-1">{formatDate(toDateISO(v.from))} - {formatDate(toDateISO(v.to))}</div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-lg card-hover">
                <h3 className="font-semibold text-slate-800 dark:text-slate-200 mb-4">📋 Heute ({todayTodos.length})</h3>
                <div className="space-y-2 max-h-48 overflow-y-auto">
                  {todayTodos.length === 0 ? (
                    <p className="text-sm text-slate-500">Keine Todos für heute</p>
                  ) : (
                    todayTodos.map(t => (
                      <div key={t.id} className="flex items-center gap-2 p-2 bg-slate-50 dark:bg-slate-700/50 rounded">
                        <input type="checkbox" checked={t.done} onChange={()=> setTodos(d => d.map(x => x.id===t.id ? {...x, done: !x.done} : x))} className="w-4 h-4 accent-indigo-600" />
                        <span className={`text-sm flex-1 ${t.done ? 'line-through text-slate-400' : ''}`}>{t.title}</span>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>
          </div>
        )
      }

      function FeatureToggles({settings, setSettings}){
        function toggle(key){ setSettings(s => ({ ...s, [key]: !s[key] })) }
        function updateColor(key, value){ setSettings(s => ({ ...s, [key]: value })) }
        const toggles = [
          {k:'timeSimulator', t:'⏱️ Time Simulator'},
          {k:'autoAlerts', t:'🔔 Auto Alerts'},
          {k:'animationsEnabled', t:'✨ Animationen'}
        ];
        return (
          <div className="space-y-6">
            <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-lg">
              <h3 className="font-semibold mb-4">🎨 Farbschema</h3>
              <div className="grid grid-cols-3 gap-4">
                <div>
                  <label className="text-xs text-slate-600 dark:text-slate-400">Primärfarbe</label>
                  <div className="flex gap-2 mt-2">
                    <input type="color" value={settings.primaryColor} onChange={(e)=> updateColor('primaryColor', e.target.value)} className="w-full h-10 rounded cursor-pointer" />
                  </div>
                </div>
                <div>
                  <label className="text-xs text-slate-600 dark:text-slate-400">Sekundärfarbe</label>
                  <div className="flex gap-2 mt-2">
                    <input type="color" value={settings.secondaryColor} onChange={(e)=> updateColor('secondaryColor', e.target.value)} className="w-full h-10 rounded cursor-pointer" />
                  </div>
                </div>
                <div>
                  <label className="text-xs text-slate-600 dark:text-slate-400">Akzentfarbe</label>
                  <div className="flex gap-2 mt-2">
                    <input type="color" value={settings.accentColor} onChange={(e)=> updateColor('accentColor', e.target.value)} className="w-full h-10 rounded cursor-pointer" />
                  </div>
                </div>
              </div>
            </div>

            <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-lg">
              <h3 className="font-semibold mb-4">⚙️ Display-Einstellungen</h3>
              <div className="space-y-3">
                {[{k:'compactMode', t:'💾 Kompakt-Modus'}, {k:'animationsEnabled', t:'✨ Animationen'}].map(t=> (
                  <div key={t.k} className="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-700/50 rounded-lg">
                    <div className="text-sm">{t.t}</div>
                    <button onClick={()=>toggle(t.k)} className={`px-3 py-1 rounded-full text-sm font-medium transition ${settings[t.k]? 'bg-emerald-500 text-white' : 'bg-slate-200 dark:bg-slate-600'}`}>{settings[t.k]? 'An' : 'Aus'}</button>
                  </div>
                ))}
              </div>
            </div>

            <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-lg">
              <h3 className="font-semibold mb-4">🧪 Experimentelle Features</h3>
              <div className="space-y-3">
                {toggles.map(t=> (
                  <div key={t.k} className="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-700/50 rounded-lg">
                    <div className="text-sm">{t.t}</div>
                    <button onClick={()=>toggle(t.k)} className={`px-3 py-1 rounded-full text-sm font-medium transition ${settings[t.k]? 'bg-indigo-500 text-white' : 'bg-slate-200 dark:bg-slate-600'}`}>{settings[t.k]? 'Aktiv' : 'Inaktiv'}</button>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )
      }

      return (
        <div className="min-h-screen" style={{ '--color-primary': settings.primaryColor, '--color-secondary': settings.secondaryColor, '--color-accent': settings.accentColor }}>
          <Nav active={active} onChange={setActive} dark={dark} setDark={setDark} />
          <main className={`max-w-7xl mx-auto ${settings.compactMode ? 'p-4' : 'p-6'}`}>
            {active === 'Dashboard' && (
              <>
                <Dashboard now={now} vacations={vacations} todos={todos} setTodos={setTodos} viewDate={viewDate} setViewDate={setViewDate} />
                <div className="mt-8">
                  <Calendar todos={todos} setTodos={setTodos} viewDate={viewDate} setViewDate={setViewDate} />
                </div>
              </>
            )}

            {active === 'Kalender' && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="lg:col-span-2">
                  <Calendar todos={todos} setTodos={setTodos} viewDate={viewDate} setViewDate={setViewDate} />
                </div>
                <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-lg card-hover">
                  <h3 className="font-semibold mb-4">📋 Alle Todos ({todos.length})</h3>
                  <div className="space-y-2 max-h-96 overflow-y-auto">
                    {todos.length === 0 ? (
                      <p className="text-sm text-slate-500">Keine Todos. Füge im Kalender welche hinzu!</p>
                    ) : (
                      todos.map(t => (
                        <div key={t.id} className="flex items-center gap-2 p-2 bg-slate-50 dark:bg-slate-700/50 rounded">
                          <input type="checkbox" checked={t.done} onChange={()=> setTodos(d => d.map(x => x.id===t.id ? {...x, done: !x.done} : x))} className="w-4 h-4 accent-indigo-600" />
                          <span className={`text-sm flex-1 ${t.done ? 'line-through text-slate-400' : ''}`}>{t.title}</span>
                          <span className="text-xs text-slate-400">{t.date}</span>
                        </div>
                      ))
                    )}
                  </div>
                </div>
              </div>
            )}

            {active === 'Stundenplan' && (
              <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-lg">
                <h2 className="text-xl font-bold">📅 Stundenplan</h2>
                <p className="text-sm text-slate-500 mt-2">Neue Stundenplan-Ansicht wird bald implementiert.</p>
                <div className="mt-4 grid grid-cols-5 gap-3">
                  {['Mo','Di','Mi','Do','Fr'].map(day => (
                    <div key={day} className="p-4 bg-indigo-50 dark:bg-indigo-900/30 rounded-lg text-center">
                      <div className="font-semibold text-indigo-700 dark:text-indigo-300">{day}</div>
                      <div className="text-sm text-slate-600 mt-2">Coming Soon</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {active === 'Experimente' && (
              <div className="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-lg">
                <h2 className="text-xl font-bold">🔬 Experimente</h2>
                <p className="text-sm text-slate-500 mt-2">Hier kannst du neue Features testen!</p>
                <div className="mt-6 p-4 bg-yellow-50 dark:bg-yellow-900/20 rounded-lg border border-yellow-200 dark:border-yellow-800">
                  <p className="text-sm text-yellow-800 dark:text-yellow-200">💡 Diese Section enthält noch kaum Features. Überprüfe die Experimentelle Settings!</p>
                </div>
              </div>
            )}

            {active === 'Einstellungen' && (
              <div>
                <h2 className="text-2xl font-bold mb-2">⚙️ Einstellungen</h2>
                <p className="text-sm text-slate-500 mb-6">Personalisiere deine Schultracker Beta nach deinem Geschmack.</p>
                <FeatureToggles settings={settings} setSettings={setSettings} />
                
                <div className="mt-6 bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-lg">
                  <h3 className="font-semibold mb-4">💾 Daten</h3>
                  <div className="flex flex-col gap-3">
                    <button onClick={handleExport} className="px-4 py-3 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white transition">📥 Alle Daten exportieren</button>
                    <label className="block">
                      <span className="text-sm text-slate-500 block mb-2">📤 Datei importieren (JSON):</span>
                      <input type="file" accept="application/json" onChange={handleImport} className="p-2 border border-slate-300 dark:border-slate-600 rounded-lg w-full dark:bg-slate-700" />
                    </label>
                  </div>
                </div>
              </div>
            )}
          </main>
        </div>
      )
    }


    ReactDOM.createRoot(document.getElementById('beta-root')).render(<BetaApp />);
  </script>

</body>
</html>
